<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timecard</title>

<style>

body{
background:#0f1114;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:#f4efe6;
margin:0;
display:flex;
justify-content:center;
padding:20px;
}

.container{
border:2px solid #ffffff;
border-radius:14px;
padding:14px;
background:#14171c;
max-width:1000px;
width:100%;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.header-title{
font-size:22px;
font-weight:600;
}

button{
background:#2d6cdf;
border:none;
color:white;
padding:8px 10px;
border-radius:6px;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

th{
padding:6px;
font-weight:600;
}

td{
padding:4px;
}

input{
width:70px;
padding:6px;
text-align:center;
border-radius:6px;
border:1px solid #555;
background:#1d2127;
color:#f4efe6;
font-size:16px;
}

.total-row td{
padding-top:10px;
font-weight:600;
}

.week-total{
display:flex;
justify-content:space-between;
margin-top:10px;
font-weight:600;
font-size:18px;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:14px;
}

.extra{
display:none;
}

.add-row{
font-size:12px;
background:#444;
padding:3px 6px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="header-title" id="weekLabel">
Timecard — Week of
</div>

<button onclick="exportCSV()">Export CSV</button>

</div>

<table id="timeTable">

<thead>
<tr>
<th></th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
<th>Sat</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

<tfoot>

<tr class="total-row">
<td>Total</td>
<td id="total-0">0</td>
<td id="total-1">0</td>
<td id="total-2">0</td>
<td id="total-3">0</td>
<td id="total-4">0</td>
<td id="total-5">0</td>
</tr>

</tfoot>

</table>

<div class="week-total">
<div>Week Total</div>
<div id="weekTotal">0</div>
</div>

<div class="controls">

<button onclick="clockIn()">Clock In</button>
<button onclick="clockOut()">Clock Out</button>

</div>

</div>

<script>

const days=6
const rows=6

function buildTable(){

let body=document.getElementById("tableBody")

for(let r=0;r<rows;r++){

let tr=document.createElement("tr")

if(r>2) tr.classList.add("extra")

let label=document.createElement("td")

if(r===0) label.innerHTML="In"
else if(r===1) label.innerHTML="Out"
else label.innerHTML=""

tr.appendChild(label)

for(let d=0;d<days;d++){

let td=document.createElement("td")

let input=document.createElement("input")

input.classList.add("time-input")
input.dataset.day=d

input.setAttribute("inputmode","numeric")

input.addEventListener("blur",formatInput)

input.addEventListener("keydown",nav)

td.appendChild(input)

tr.appendChild(td)

}

body.appendChild(tr)

}

}

function formatInput(e){

let v=e.target.value.replace(/[^\d]/g,'')

if(v.length===3)v=v[0]+":"+v.slice(1)

if(v.length===4)v=v.slice(0,2)+":"+v.slice(2)

if(v && !v.includes(":"))v+=":00"

e.target.value=v

calc()

}

function parse(v){

if(!v)return null

let p=v.split(":")

return parseInt(p[0])+(parseInt(p[1]||0)/60)

}

function round15(h){

return Math.round(h*4)/4

}

function calc(){

let week=0

for(let d=0;d<days;d++){

let inputs=document.querySelectorAll("input[data-day='"+d+"']")

let total=0

for(let i=0;i<inputs.length;i+=2){

let a=parse(inputs[i]?.value)

let b=parse(inputs[i+1]?.value)

if(a!=null && b!=null){

let diff=b-a

if(diff<0)diff+=12

diff=round15(diff)

total+=diff

}

}

document.getElementById("total-"+d).innerText=total.toFixed(2)

week+=total

}

document.getElementById("weekTotal").innerText=week.toFixed(2)

}

function nav(e){

let td=e.target.parentElement
let tr=td.parentElement

let col=td.cellIndex

if(e.key==="ArrowDown"||e.key==="Tab"){

e.preventDefault()

let next=tr.nextElementSibling

if(next){
let input=next.children[col].querySelector("input")
if(input)input.focus()
}

}

if(e.key==="ArrowUp"){

e.preventDefault()

let prev=tr.previousElementSibling

if(prev){
let input=prev.children[col].querySelector("input")
if(input)input.focus()
}

}

}

function nowTime(){

let d=new Date()

let h=d.getHours()
let m=d.getMinutes()

return h+":"+String(m).padStart(2,"0")

}

function clockIn(){

let inputs=document.querySelectorAll(".time-input")

for(let i=0;i<inputs.length;i+=2){

if(!inputs[i].value){

inputs[i].value=nowTime()

break
}

}

calc()

}

function clockOut(){

let inputs=document.querySelectorAll(".time-input")

for(let i=1;i<inputs.length;i+=2){

if(!inputs[i].value){

inputs[i].value=nowTime()

break
}

}

calc()

}

function exportCSV(){

let csv=[]

let header=["","Mon","Tue","Wed","Thu","Fri","Sat"]

csv.push(header.join(","))

let rows=document.querySelectorAll("#tableBody tr")

rows.forEach(r=>{

let row=[]

r.querySelectorAll("td").forEach(td=>{

let input=td.querySelector("input")

row.push(input?input.value:td.innerText)

})

csv.push(row.join(","))

})

let totals=["Total"]

for(let d=0;d<days;d++){

totals.push(document.getElementById("total-"+d).innerText)

}

csv.push(totals.join(","))

let blob=new Blob([csv.join("\n")],{type:"text/csv"})

let a=document.createElement("a")

let week=new Date().toISOString().slice(0,10)

a.download="timecard-"+week+".csv"

a.href=URL.createObjectURL(blob)

a.click()

}

buildTable()

</script>

</body>
</html>
