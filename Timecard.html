<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Timecard</title>
<style>
  :root {
    --bg:           #f5f2eb;
    --bg2:          #edeae1;
    --rule:         #d4d0c8;
    --ink:          #1a1814;
    --ink2:         #6b6760;
    --ink3:         #a8a49e;
    --accent:       #c44b2b;
    --in-col:       #e8f4e8;
    --out-col:      #fdf0e8;
    --in-ink:       #2d6b3a;
    --out-ink:      #8b4020;
    --today-bg:     #fffbe6;
    --today-bd:     #c4a020;
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
color: var(–ink);
min-height: 100vh;
overflow-x: hidden;
-webkit-text-size-adjust: 100%;
}

/* TOP BAR */
#topbar {
background: var(–ink);
padding: 0 12px;
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
-webkit-flex-wrap: wrap;
flex-wrap: wrap;
gap: 8px;
min-height: 48px;
position: -webkit-sticky;
position: sticky;
top: 0;
z-index: 100;
border-bottom: 3px solid var(–accent);
}
#topbar h1 {
font-size: 20px;
font-weight: 700;
letter-spacing: 3px;
color: white;
text-transform: uppercase;
}
.nav-btn {
background: transparent;
border: 1px solid #555;
color: #aaa;
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
font-size: 11px;
padding: 5px 10px;
border-radius: 4px;
cursor: pointer;
letter-spacing: 0.5px;
white-space: nowrap;
-webkit-appearance: none;
}
.nav-btn:active { opacity: 0.7; }
.nav-btn:disabled { opacity: 0.25; }
.nav-btn.hi { border-color: var(–accent); color: #f5a090; }
#week-label {
font-size: 11px;
color: #bbb;
-webkit-flex: 1;
flex: 1;
text-align: center;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
#export-btn {
background: var(–accent);
border: none;
color: white;
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
font-size: 11px;
font-weight: 600;
padding: 7px 12px;
border-radius: 4px;
cursor: pointer;
white-space: nowrap;
-webkit-appearance: none;
margin-left: auto;
}
#export-btn:active { opacity: 0.8; }

/* PAST BANNER */
#past-banner {
background: #fff8e1;
border-bottom: 1px solid #f0d060;
padding: 8px 14px;
font-size: 11px;
color: #7a6020;
display: none;
}

/* INPUT ZONE */
#input-zone {
background: var(–bg2);
border-bottom: 2px solid var(–rule);
padding: 10px 12px;
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
-webkit-flex-wrap: wrap;
flex-wrap: wrap;
gap: 10px;
}
#input-zone.hidden { display: none; }

.day-pills {
display: -webkit-flex;
display: flex;
gap: 4px;
-webkit-flex-wrap: wrap;
flex-wrap: wrap;
}
.day-pill {
background: transparent;
border: 1.5px solid var(–rule);
color: var(–ink2);
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
font-size: 11px;
padding: 5px 9px;
border-radius: 4px;
cursor: pointer;
letter-spacing: 0.5px;
-webkit-appearance: none;
}
.day-pill.active { background: var(–ink); color: white; border-color: var(–ink); }
.day-pill:active { opacity: 0.7; }
.dot { color: var(–accent); margin-left: 2px; }

#next-label {
font-size: 10px;
color: var(–ink3);
letter-spacing: 0.5px;
margin-bottom: 4px;
}
.input-row {
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
gap: 8px;
}
#time-input {
background: white;
border: 2px solid var(–rule);
color: var(–ink);
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
font-size: 26px;
font-weight: 500;
letter-spacing: 5px;
padding: 6px 12px;
width: 140px;
text-align: center;
border-radius: 4px;
outline: none;
-webkit-appearance: none;
}
#time-input:focus { border-color: var(–ink); }
#enter-btn {
background: var(–ink);
color: white;
border: none;
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
font-size: 12px;
font-weight: 600;
letter-spacing: 1px;
padding: 9px 16px;
border-radius: 4px;
cursor: pointer;
-webkit-appearance: none;
}
#enter-btn:active { opacity: 0.8; }
#error-msg {
font-size: 11px;
color: var(–accent);
display: none;
}

/* GRID */
#grid-wrap { padding: 10px 10px 0; overflow-x: hidden; }

#grid-weekdays {
display: -webkit-flex;
display: flex;
gap: 3px;
}
#grid-weekdays .day-col { -webkit-flex: 1; flex: 1; }

#grid-weekend {
display: -webkit-flex;
display: flex;
gap: 3px;
margin-top: 3px;
}
#grid-weekend .day-col { -webkit-flex: 1; flex: 1; }
#grid-weekend.hidden { display: none; }

#weekend-toggle {
display: -webkit-inline-flex;
display: inline-flex;
-webkit-align-items: center;
align-items: center;
gap: 5px;
margin: 5px 0 0;
padding: 0;
background: none;
border: none;
cursor: pointer;
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
font-size: 11px;
color: var(–ink3);
letter-spacing: 0.5px;
-webkit-appearance: none;
}
#weekend-toggle:active { opacity: 0.7; }
.arr { display: inline-block; -webkit-transition: -webkit-transform 0.2s; transition: transform 0.2s; font-size: 9px; }
#weekend-toggle.open .arr { -webkit-transform: rotate(90deg); transform: rotate(90deg); }
.wh { color: var(–accent); font-weight: 600; }

/* Day column */
.day-col {
background: white;
border: 1px solid var(–rule);
border-radius: 3px;
overflow: hidden;
min-width: 0;
}
.day-col.is-today { background: var(–today-bg); border: 2px solid var(–today-bd); }
.day-col.is-active .day-head { background: var(–ink); }
.day-col.is-active .day-name-text { color: white; }
.day-col.is-active .day-hrs { color: #aaa; }
.day-col.is-active .day-hrs b { color: white; }

.day-head {
padding: 5px 6px 4px;
border-bottom: 1px solid var(–rule);
background: var(–bg2);
}
.day-name {
display: -webkit-flex;
display: flex;
-webkit-justify-content: space-between;
justify-content: space-between;
-webkit-align-items: center;
align-items: center;
}
.day-name-text {
font-size: 12px;
font-weight: 700;
letter-spacing: 1px;
color: var(–ink);
text-transform: uppercase;
}
.today-tag {
font-size: 7px;
background: var(–accent);
color: white;
padding: 1px 3px;
border-radius: 2px;
letter-spacing: 0.5px;
font-weight: 600;
}
.day-hrs { font-size: 10px; margin-top: 2px; color: var(–ink2); }
.day-hrs b { font-size: 11px; font-weight: 600; color: var(–ink); }

/* Pairs */
.pairs-list { padding: 1px 0; }
.pair-block { border-bottom: 1px dashed var(–rule); }
.pair-block:last-child { border-bottom: none; }

.time-slot {
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
padding: 2px 5px;
min-height: 20px;
}
.time-slot.in-slot  { background: var(–in-col); }
.time-slot.out-slot { background: var(–out-col); }

.slot-lbl {
font-size: 7px;
letter-spacing: 0.5px;
width: 14px;
-webkit-flex-shrink: 0;
flex-shrink: 0;
font-weight: 600;
}
.in-slot  .slot-lbl { color: var(–in-ink); }
.out-slot .slot-lbl { color: var(–out-ink); }

.slot-val {
-webkit-flex: 1;
flex: 1;
font-size: 10px;
text-align: right;
min-width: 0;
}
.in-slot  .slot-val { color: var(–in-ink); }
.out-slot .slot-val { color: var(–out-ink); }
.slot-val.pending { color: var(–ink3); }
.slot-val.editable { cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-decoration-color: var(–ink3); }

.del-btn {
opacity: 0;
background: none;
border: none;
color: var(–accent);
cursor: pointer;
font-size: 14px;
padding: 0 0 0 4px;
line-height: 1;
-webkit-flex-shrink: 0;
flex-shrink: 0;
-webkit-appearance: none;
}
.pair-block:hover .del-btn { opacity: 1; }
/* Always show on touch devices */
@media (hover: none) { .del-btn { opacity: 0.4; } }

.edit-input {
-webkit-flex: 1;
flex: 1;
width: 100%;
background: white;
border: 1px solid var(–accent);
border-radius: 2px;
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
font-size: 10px;
font-weight: 600;
letter-spacing: 2px;
text-align: center;
padding: 1px 2px;
outline: none;
color: var(–ink);
-webkit-appearance: none;
}

/* Flash */
@-webkit-keyframes flashGreen  { 0% { background: #b8f0c0; } 100% { background: var(–in-col); } }
@keyframes          flashGreen  { 0% { background: #b8f0c0; } 100% { background: var(–in-col); } }
@-webkit-keyframes flashOrange { 0% { background: #ffd4a8; } 100% { background: var(–out-col); } }
@keyframes          flashOrange { 0% { background: #ffd4a8; } 100% { background: var(–out-col); } }
.flash-in  { -webkit-animation: flashGreen  0.7s ease; animation: flashGreen  0.7s ease; }
.flash-out { -webkit-animation: flashOrange 0.7s ease; animation: flashOrange 0.7s ease; }

/* WEEKLY BAR */
#weekly-bar {
margin: 8px 10px 10px;
background: var(–ink);
color: white;
padding: 12px 16px;
display: -webkit-flex;
display: flex;
-webkit-justify-content: space-between;
justify-content: space-between;
-webkit-align-items: center;
align-items: center;
border-radius: 4px;
}
.wbar-lbl { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: #888; text-transform: uppercase; }
#weekly-val { font-size: 28px; font-weight: 300; color: white; letter-spacing: 1px; }
#weekly-val .unit { font-size: 12px; color: #888; margin-left: 4px; }

/* HINT */
#hint { text-align: center; font-size: 10px; color: var(–ink3); letter-spacing: 0.5px; padding: 0 12px 16px; }
</style>

</head>
<body>

<div id="topbar">
  <h1>Timecard</h1>
  <button class="nav-btn" id="prev-btn">&#8592; Prev</button>
  <div id="week-label">—</div>
  <button class="nav-btn" id="next-btn">Next &#8594;</button>
  <button class="nav-btn hi" id="today-btn" style="display:none">Today</button>
  <button id="export-btn">&#8595; Export CSV</button>
</div>

<div id="past-banner">Viewing a past week — read only. Tap Today to return.</div>

<div id="input-zone">
  <div>
    <div style="font-size:10px;color:var(--ink3);letter-spacing:0.5px;margin-bottom:4px;">LOGGING TO</div>
    <div class="day-pills" id="day-pills"></div>
  </div>
  <div>
    <div id="next-label">NEXT: CLOCK IN</div>
    <div class="input-row">
      <input type="text" id="time-input" placeholder="0000" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="enter-btn">ENTER</button>
      <span id="error-msg"></span>
    </div>
  </div>
</div>

<div id="grid-wrap">
  <div id="grid-weekdays"></div>
  <button id="weekend-toggle">
    <span class="arr">&#9658;</span>
    Sat / Sun
    <span class="wh" id="wknd-lbl"></span>
  </button>
  <div id="grid-weekend" class="hidden"></div>
</div>

<div id="weekly-bar">
  <div class="wbar-lbl">Weekly Total</div>
  <div id="weekly-val">0.00 <span class="unit">hrs</span></div>
</div>

<div id="hint">Type 4 digits &nbsp;&middot;&nbsp; 900 = 9:00 AM &nbsp;&middot;&nbsp; 1700 = 5:00 PM &nbsp;&middot;&nbsp; Tap any time to edit</div>

<script>
var DAYS        = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var MAX_PAIRS   = 10;
var STORAGE_KEY = 'timecard_v3';

// ── Utilities ──────────────────────────────────────────────────────────────

function getWeekKey(date) {
  var d   = new Date(date);
  var day = d.getDay();
  var mon = new Date(d);
  mon.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
  return mon.toISOString().split('T')[0];
}

function formatWeekLabel(key) {
  var s = new Date(key + 'T12:00:00');
  var e = new Date(s);
  e.setDate(e.getDate() + 6);
  var o = { month: 'short', day: 'numeric' };
  return s.toLocaleDateString('en-US', o) + ' \u2013 ' + e.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function todayDayIdx() {
  var d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function parseTime(raw) {
  var s = raw ? raw.trim() : '';
  if (!s) return null;
  var n = parseInt(s, 10);
  if (isNaN(n) || n < 0 || n > 2359) return null;
  var h = Math.floor(n / 100);
  var m = n % 100;
  if (h > 23 || m > 59) return null;
  return { h: h, m: m };
}

function fmtTime(t) {
  var ap = t.h >= 12 ? 'PM' : 'AM';
  var dh = t.h % 12 === 0 ? 12 : t.h % 12;
  return dh + ':' + (t.m < 10 ? '0' : '') + t.m + ' ' + ap;
}

function toMins(t) { return t.h * 60 + t.m; }

function pairHours(p) {
  if (!p || !p.in || !p.out) return 0;
  return Math.max(0, (toMins(p.out) - toMins(p.in)) / 60);
}

function dayHours(pairs) {
  var total = 0;
  for (var i = 0; i < pairs.length; i++) total += pairHours(pairs[i]);
  return total;
}

// ── Storage ────────────────────────────────────────────────────────────────

function loadAll() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveAll(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function emptyWeek() {
  var w = [];
  for (var i = 0; i < DAYS.length; i++) w.push({ pairs: [] });
  return w;
}

// ── State ──────────────────────────────────────────────────────────────────

var allData     = loadAll();
var currentWeek = getWeekKey(new Date());
var activeDay   = todayDayIdx();
var weekendOpen = todayDayIdx() >= 5;
var flashTarget = null;

function weekData() {
  return allData[currentWeek] || emptyWeek();
}

function isThisWeek() {
  return currentWeek === getWeekKey(new Date());
}

// ── Render ─────────────────────────────────────────────────────────────────

function render() {
  renderTopBar();
  renderInputZone();
  renderGrid();
  renderWeeklyTotal();
}

function renderTopBar() {
  document.getElementById('week-label').textContent = formatWeekLabel(currentWeek);
  document.getElementById('next-btn').disabled = isThisWeek();
  document.getElementById('today-btn').style.display = isThisWeek() ? 'none' : '';
  document.getElementById('past-banner').style.display = isThisWeek() ? 'none' : 'block';
}

function renderInputZone() {
  var zone = document.getElementById('input-zone');
  if (!isThisWeek()) { zone.className = 'hidden'; return; }
  zone.className = '';

  var pillsEl  = document.getElementById('day-pills');
  pillsEl.innerHTML = '';
  var todayIdx = todayDayIdx();

  for (var i = 0; i < DAYS.length; i++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.className = 'day-pill' + (idx === activeDay ? ' active' : '');
      btn.textContent = DAYS[idx].slice(0, 3).toUpperCase();
      if (idx === todayIdx) {
        var dot = document.createElement('span');
        dot.className = 'dot';
        dot.textContent = '\u25CF';
        btn.appendChild(dot);
      }
      btn.onclick = function() {
        activeDay = idx;
        render();
        document.getElementById('time-input').focus();
      };
      pillsEl.appendChild(btn);
    })(i);
  }

  var pairs   = weekData()[activeDay].pairs;
  var nextIsIn = pairs.length === 0 || pairs[pairs.length - 1].out !== undefined;
  document.getElementById('next-label').textContent = 'NEXT: CLOCK ' + (nextIsIn ? 'IN' : 'OUT');
}

function renderGrid() {
  var wdEl = document.getElementById('grid-weekdays');
  var weEl = document.getElementById('grid-weekend');
  wdEl.innerHTML = '';
  weEl.innerHTML = '';

  var wd         = weekData();
  var todayIdx   = todayDayIdx();
  var weekendHrs = 0;

  for (var di = 0; di < DAYS.length; di++) {
    (function(dayIdx) {
      var pairs  = wd[dayIdx].pairs;
      var total  = dayHours(pairs);
      if (dayIdx >= 5) weekendHrs += total;

      var isToday  = isThisWeek() && dayIdx === todayIdx;
      var isActive = isThisWeek() && dayIdx === activeDay;

      var col = document.createElement('div');
      col.className = 'day-col' + (isToday ? ' is-today' : '') + (isActive ? ' is-active' : '');

      // Header
      var head = document.createElement('div');
      head.className = 'day-head';

      var nameRow = document.createElement('div');
      nameRow.className = 'day-name';

      var nameText = document.createElement('span');
      nameText.className = 'day-name-text';
      nameText.textContent = DAYS[dayIdx].slice(0, 3).toUpperCase();
      nameRow.appendChild(nameText);

      if (isToday) {
        var tag = document.createElement('span');
        tag.className = 'today-tag';
        tag.textContent = 'TODAY';
        nameRow.appendChild(tag);
      }

      var hrsDiv = document.createElement('div');
      hrsDiv.className = 'day-hrs';
      if (total > 0) {
        var b = document.createElement('b');
        b.textContent = total.toFixed(2);
        hrsDiv.appendChild(b);
        hrsDiv.appendChild(document.createTextNode(' hrs'));
      } else {
        hrsDiv.innerHTML = '<span style="opacity:0.3">\u2014</span>';
      }

      head.appendChild(nameRow);
      head.appendChild(hrsDiv);
      col.appendChild(head);

      // Pairs list
      var list = document.createElement('div');
      list.className = 'pairs-list';

      if (pairs.length === 0) {
        var ph = document.createElement('div');
        ph.style.cssText = 'padding:4px 5px;font-size:9px;color:var(--rule);text-align:right;';
        ph.textContent = '\u2014';
        list.appendChild(ph);
      }

      for (var pi = 0; pi < pairs.length; pi++) {
        (function(pairIdx) {
          var pair = pairs[pairIdx];
          var isFlashIn  = flashTarget && flashTarget.day === dayIdx && flashTarget.row === pairIdx && flashTarget.type === 'in';
          var isFlashOut = flashTarget && flashTarget.day === dayIdx && flashTarget.row === pairIdx && flashTarget.type === 'out';

          var block = document.createElement('div');
          block.className = 'pair-block';

          // IN slot
          var inSlot = document.createElement('div');
          inSlot.className = 'time-slot in-slot' + (isFlashIn ? ' flash-in' : '');

          var inLbl = document.createElement('span');
          inLbl.className = 'slot-lbl';
          inLbl.textContent = 'IN';

          var inVal = document.createElement('span');
          inVal.className = 'slot-val editable';
          inVal.textContent = fmtTime(pair.in);
          inVal.title = 'Tap to edit';
          (function(sEl, vEl, dIdx, pIdx) {
            vEl.addEventListener('click', function() { startEdit(sEl, vEl, dIdx, pIdx, 'in'); });
          })(inSlot, inVal, dayIdx, pairIdx);

          var delBtn = document.createElement('button');
          delBtn.className = 'del-btn';
          delBtn.textContent = '\u00D7';
          delBtn.title = 'Delete';
          (function(dIdx, pIdx) {
            delBtn.addEventListener('click', function() { deletePair(dIdx, pIdx); });
          })(dayIdx, pairIdx);

          inSlot.appendChild(inLbl);
          inSlot.appendChild(inVal);
          inSlot.appendChild(delBtn);

          // OUT slot
          var outSlot = document.createElement('div');
          outSlot.className = 'time-slot out-slot' + (isFlashOut ? ' flash-out' : '');

          var outLbl = document.createElement('span');
          outLbl.className = 'slot-lbl';
          outLbl.textContent = 'OUT';

          var outVal = document.createElement('span');
          if (pair.out) {
            outVal.className = 'slot-val editable';
            outVal.textContent = fmtTime(pair.out);
            outVal.title = 'Tap to edit';
            (function(sEl, vEl, dIdx, pIdx) {
              vEl.addEventListener('click', function() { startEdit(sEl, vEl, dIdx, pIdx, 'out'); });
            })(outSlot, outVal, dayIdx, pairIdx);
          } else {
            outVal.className = 'slot-val pending';
            outVal.textContent = '\u2014';
          }

          outSlot.appendChild(outLbl);
          outSlot.appendChild(outVal);

          block.appendChild(inSlot);
          block.appendChild(outSlot);
          list.appendChild(block);
        })(pi);
      }

      col.appendChild(list);
      (dayIdx < 5 ? wdEl : weEl).appendChild(col);
    })(di);
  }

  // Weekend toggle
  var tog = document.getElementById('weekend-toggle');
  if (weekendOpen) tog.className = 'open';
  else tog.className = '';
  document.getElementById('wknd-lbl').textContent = weekendHrs > 0 ? weekendHrs.toFixed(2) + ' hrs' : '';
  var weGrid = document.getElementById('grid-weekend');
  if (weekendOpen) weGrid.className = '';
  else weGrid.className = 'hidden';
}

function renderWeeklyTotal() {
  var wd    = weekData();
  var total = 0;
  for (var i = 0; i < wd.length; i++) total += dayHours(wd[i].pairs);
  document.getElementById('weekly-val').innerHTML = total.toFixed(2) + ' <span class="unit">hrs</span>';
}

// ── Inline editing ─────────────────────────────────────────────────────────

function startEdit(slotEl, valSpan, di, pi, type) {
  if (slotEl.querySelector('.edit-input')) return;

  var wd      = weekData();
  var current = wd[di].pairs[pi][type];
  var prefill = current ? String(current.h * 100 + current.m) : '';

  var inp = document.createElement('input');
  inp.type        = 'text';
  inp.inputMode   = 'numeric';
  inp.pattern     = '[0-9]*';
  inp.maxLength   = 4;
  inp.className   = 'edit-input';
  inp.value       = prefill;
  inp.placeholder = '0000';
  inp.autocomplete = 'off';

  valSpan.parentNode.replaceChild(inp, valSpan);
  inp.focus();
  inp.select();

  var committed = false;

  function commit() {
    if (committed) return;
    committed = true;
    var parsed = parseTime(inp.value);
    if (!parsed) { render(); return; }

    var wd2  = weekData();
    var p    = wd2[di].pairs[pi];
    var inM  = type === 'out' ? toMins(p.in)  : toMins(parsed);
    var outM = type === 'in'  ? (p.out ? toMins(p.out) : Infinity) : toMins(parsed);

    if (outM <= inM) {
      showError(type === 'in' ? 'In must be before out' : 'Out must be after in');
      render();
      return;
    }

    var newPairs = [];
    for (var i = 0; i < wd2[di].pairs.length; i++) {
      if (i === pi) {
        var np = { in: wd2[di].pairs[i].in, out: wd2[di].pairs[i].out };
        np[type] = parsed;
        newPairs.push(np);
      } else {
        newPairs.push(wd2[di].pairs[i]);
      }
    }
    var newWeek = [];
    for (var j = 0; j < wd2.length; j++) {
      newWeek.push(j === di ? { pairs: newPairs } : wd2[j]);
    }
    allData[currentWeek] = newWeek;
    saveAll(allData);

    flashTarget = { day: di, row: pi, type: type };
    render();
    setTimeout(function() { flashTarget = null; render(); }, 700);
  }

  inp.addEventListener('keydown', function(e) {
    if (e.keyCode === 13) { e.preventDefault(); commit(); }
    if (e.keyCode === 27) { e.preventDefault(); committed = true; render(); }
  });
  inp.addEventListener('blur', function() { setTimeout(commit, 150); });
}

// ── Delete pair ────────────────────────────────────────────────────────────

function deletePair(di, pi) {
  var wd2      = weekData();
  var newPairs = [];
  for (var i = 0; i < wd2[di].pairs.length; i++) {
    if (i !== pi) newPairs.push(wd2[di].pairs[i]);
  }
  var newWeek = [];
  for (var j = 0; j < wd2.length; j++) {
    newWeek.push(j === di ? { pairs: newPairs } : wd2[j]);
  }
  allData[currentWeek] = newWeek;
  saveAll(allData);
  render();
}

// ── Error display ──────────────────────────────────────────────────────────

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent   = msg;
  el.style.display = 'inline';
  setTimeout(function() { el.style.display = 'none'; }, 2500);
}

// ── Submit new time ────────────────────────────────────────────────────────

function submitTime() {
  var raw    = document.getElementById('time-input').value.trim();
  var parsed = parseTime(raw);
  if (!parsed) { showError('Enter 0\u20132359, e.g. 900 or 1700'); return; }

  var wd     = weekData();
  var pairs  = wd[activeDay].pairs.slice();
  var targetRow, targetType;

  if (pairs.length === 0 || pairs[pairs.length - 1].out !== undefined) {
    if (pairs.length >= MAX_PAIRS) { showError('Max 10 pairs reached for this day'); return; }
    pairs.push({ in: parsed });
    targetRow  = pairs.length - 1;
    targetType = 'in';
  } else {
    var last = pairs[pairs.length - 1];
    if (toMins(parsed) <= toMins(last.in)) { showError('Clock-out must be after clock-in'); return; }
    pairs[pairs.length - 1] = { in: last.in, out: parsed };
    targetRow  = pairs.length - 1;
    targetType = 'out';
  }

  var newWeek = [];
  for (var i = 0; i < wd.length; i++) {
    newWeek.push(i === activeDay ? { pairs: pairs } : wd[i]);
  }
  allData[currentWeek] = newWeek;
  saveAll(allData);

  flashTarget = { day: activeDay, row: targetRow, type: targetType };
  render();
  setTimeout(function() { flashTarget = null; render(); }, 750);

  document.getElementById('time-input').value = '';
  document.getElementById('time-input').focus();
}

// ── Navigation ─────────────────────────────────────────────────────────────

document.getElementById('prev-btn').addEventListener('click', function() {
  var d = new Date(currentWeek + 'T12:00:00');
  d.setDate(d.getDate() - 7);
  currentWeek = getWeekKey(d);
  render();
});

document.getElementById('next-btn').addEventListener('click', function() {
  var d = new Date(currentWeek + 'T12:00:00');
  d.setDate(d.getDate() + 7);
  currentWeek = getWeekKey(d);
  render();
});

document.getElementById('today-btn').addEventListener('click', function() {
  currentWeek = getWeekKey(new Date());
  render();
});

document.getElementById('time-input').addEventListener('keydown', function(e) {
  if (e.keyCode === 13) submitTime();
});
document.getElementById('enter-btn').addEventListener('click', submitTime);

document.getElementById('weekend-toggle').addEventListener('click', function() {
  weekendOpen = !weekendOpen;
  render();
});

// ── Export CSV ─────────────────────────────────────────────────────────────

document.getElementById('export-btn').addEventListener('click', function() {
  var wd    = weekData();
  var lines = [];

  lines.push('TIMECARD - ' + formatWeekLabel(currentWeek));
  lines.push('');

  // Header
  var hdr = [''];
  for (var i = 0; i < DAYS.length; i++) { hdr.push(DAYS[i]); hdr.push(''); }
  lines.push(hdr.join(','));

  var sub = [''];
  for (var i = 0; i < DAYS.length; i++) { sub.push('Clock In'); sub.push('Clock Out'); }
  lines.push(sub.join(','));

  // Pairs
  for (var pi = 0; pi < MAX_PAIRS; pi++) {
    var row = ['Pair ' + (pi + 1)];
    for (var di = 0; di < DAYS.length; di++) {
      var p = wd[di].pairs[pi];
      row.push(p && p.in  ? fmtTime(p.in)  : '');
      row.push(p && p.out ? fmtTime(p.out) : '');
    }
    lines.push(row.join(','));
  }

  lines.push('');

  // Totals
  var totRow  = ['DAILY TOTAL'];
  var weekTot = 0;
  for (var di = 0; di < DAYS.length; di++) {
    var t = dayHours(wd[di].pairs);
    weekTot += t;
    totRow.push(t.toFixed(2) + ' hrs');
    totRow.push('');
  }
  lines.push(totRow.join(','));
  lines.push('');
  lines.push('WEEKLY TOTAL,' + weekTot.toFixed(2) + ' hrs');

  var csv      = lines.join('\n');
  var filename = 'timecard_' + currentWeek.replace(/-/g, '') + '.csv';

  // Safari-compatible download
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function() {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
});

// ── Init ───────────────────────────────────────────────────────────────────

render();
</script>
